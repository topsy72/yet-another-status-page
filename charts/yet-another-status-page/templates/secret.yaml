{{- if and (not .Values.existingSecret) .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yasp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yasp.labels" . | nindent 4 }}
type: Opaque
stringData:
  PAYLOAD_SECRET: {{ required "secret.payloadSecret is required when secret.create is true and existingSecret is unset" .Values.secret.payloadSecret | quote }}
  {{- if and (not .Values.postgresql.enabled) .Values.secret.databaseUri }}
  DATABASE_URI: {{ .Values.secret.databaseUri | quote }}
  {{- end }}
{{- end }}
