services:
  app:
    # Build from source for ARM64 compatibility (Apple Silicon):
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URI=postgres://hostzero:${POSTGRES_PASSWORD:-changeme}@db:5432/hostzero_status
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-change-this-to-a-random-32-char-string}
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
      # Demo mode configuration
      - DEMO_MODE=true
      - DEMO_USER_EMAIL=${DEMO_USER_EMAIL:-demo@yasp.io}
      - DEMO_USER_PASSWORD=${DEMO_USER_PASSWORD:-demo2026#}
      - DEMO_RESET_INTERVAL_MINUTES=${DEMO_RESET_INTERVAL_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/public/media

  demo-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run demo:scheduler
    environment:
      - DATABASE_URI=postgres://hostzero:${POSTGRES_PASSWORD:-changeme}@db:5432/hostzero_status
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-change-this-to-a-random-32-char-string}
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
      - DEMO_MODE=true
      - DEMO_USER_EMAIL=${DEMO_USER_EMAIL:-demo@yasp.io}
      - DEMO_USER_PASSWORD=${DEMO_USER_PASSWORD:-demo2026#}
      - DEMO_RESET_INTERVAL_MINUTES=${DEMO_RESET_INTERVAL_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hostzero
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=hostzero_status
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostzero -d hostzero_status"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
